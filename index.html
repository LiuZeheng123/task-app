<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>每日计划</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="每日计划">
  <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/2693/2693507.png">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --bg: #f8fafc; --card: #fff; --text: #1e293b; --text2: #64748b;
      --accent: #667eea; --accent2: #764ba2; --success: #4ade80; --danger: #ef4444;
      --shadow: 0 4px 12px rgba(0,0,0,0.08); --radius: 16px;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #0f172a; --card: #1e293b; --text: #e2e8f0; --text2: #94a3b8;
        --shadow: 0 4px 12px rgba(0,0,0,0.3);
      }
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); padding: 20px; min-height: 100vh; }
    header { text-align: center; margin-bottom: 20px; }
    h1 { font-size: 1.8rem; margin-bottom: 5px; }
    .subtitle { color: var(--text2); font-size: 0.95rem; }
    .grid { display: grid; grid-template-columns: 1fr; gap: 15px; max-width: 600px; margin: 0 auto; }
    @media (min-width: 768px) { .grid { grid-template-columns: 1fr 1fr; } }
    .card { background: var(--card); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .card h3 { font-size: 1rem; margin-bottom: 10px; display: flex; align-items: center; gap: 8px; }
    textarea, input { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 10px; background: var(--bg); color: var(--text); font-size: 1rem; margin-bottom: 10px; }
    textarea:focus, input:focus { outline: none; border-color: var(--accent); }
    button { background: linear-gradient(135deg, var(--accent), var(--accent2)); color: white; border: none; padding: 10px 16px; border-radius: 10px; font-weight: 500; cursor: pointer; width: 100%; }
    button:hover { opacity: 0.9; }
    .todo-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg); border-radius: 10px; margin-bottom: 8px; }
    .todo-item.done { opacity: 0.6; text-decoration: line-through; }
    .check { width: 22px; height: 22px; border: 2px solid var(--accent); border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .check.checked { background: var(--success); border-color: var(--success); }
    .check.checked::after { content: '✓'; color: white; font-size: 14px; }
    .progress { height: 8px; background: var(--bg); border-radius: 4px; margin-top: 10px; overflow: hidden; }
    .bar { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); width: 0%; transition: 0.5s; }
    .stats { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; }
    .stat { background: var(--bg); padding: 8px 12px; border-radius: 8px; font-size: 0.85rem; flex: 1; text-align: center; }
    .stat span { font-weight: 600; color: var(--accent); }
    .notification-box { margin-top: 10px; padding: 10px; background: var(--bg); border-radius: 10px; display: flex; flex-direction: column; gap: 8px; }
    .toggle { display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
    .switch { width: 40px; height: 22px; background: #cbd5e1; border-radius: 11px; position: relative; transition: 0.3s; }
    .switch.on { background: var(--accent); }
    .switch::after { content: ''; position: absolute; top: 3px; left: 3px; width: 16px; height: 16px; background: white; border-radius: 50%; transition: 0.3s; }
    .switch.on::after { left: 21px; }
    #chartContainer { height: 180px; margin-top: 10px; }
    .empty { text-align: center; color: var(--text2); padding: 20px 0; }
    .reward { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.7); display: none; align-items: center; justify-content: center; z-index: 100; }
    .reward.show { display: flex; }
    .reward-box { background: var(--card); padding: 30px; border-radius: 24px; text-align: center; max-width: 90%; width: 400px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
    .reward img { width: 100%; height: 180px; object-fit: cover; border-radius: 16px; margin-bottom: 15px; }
    .quote { font-style: italic; color: var(--text2); margin: 15px 0; line-height: 1.6; }
    .author { font-weight: 600; margin-bottom: 20px; }
    .btn-close { padding: 12px 30px; border-radius: 30px; }
  </style>
</head>
<body>
  <header>
    <h1>📅 每日计划</h1>
    <p class="subtitle">规划每一天，遇见更好的自己</p>
  </header>

  <div class="grid">
    <!-- 计划 -->
    <div class="card">
      <h3>📝 今日计划</h3>
      <textarea id="plan" placeholder="写下今天的目标与心情..."></textarea>
      <div class="stats">
        <div class="stat">总任务: <span id="total">0</span></div>
        <div class="stat">已完成: <span id="done">0</span></div>
        <div class="stat">进度: <span id="pct">0%</span></div>
      </div>
      <div class="progress"><div class="bar" id="bar"></div></div>
    </div>

    <!-- 待办 -->
    <div class="card">
      <h3>✅ 待办事项</h3>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <input type="text" id="todoInput" placeholder="添加新事项..." style="flex:1;margin:0;">
        <button onclick="addTodo()" style="width:auto;padding:10px;">添加</button>
      </div>
      <div id="todoList"></div>
    </div>

    <!-- 统计 -->
    <div class="card">
      <h3>📊 周数据统计</h3>
      <div id="chartContainer"><canvas id="weekChart"></canvas></div>
      <p style="font-size:0.8rem;color:var(--text2);margin-top:5px;">自动记录近 7 天完成率</p>
    </div>

    <!-- 通知设置 -->
    <div class="card">
      <h3>🔔 每日提醒</h3>
      <div class="notification-box">
        <div class="toggle" onclick="toggleNotif()">
          <span>开启推送提醒</span>
          <div class="switch" id="notifSwitch"></div>
        </div>
        <input type="time" id="notifTime" value="09:00" onchange="saveNotif()">
        <p style="font-size:0.8rem;color:var(--text2);">⏰ 每天指定时间提醒查看计划<br>📱 需保持 App 在后台运行（iOS/Android 均支持）</p>
      </div>
    </div>
  </div>

  <!-- 完成奖励弹窗 -->
  <div class="reward" id="rewardModal">
    <div class="reward-box">
      <img id="rewardImg" src="https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600" alt="风景">
      <h2 style="color:var(--accent);margin-bottom:10px;">🎉 太棒了！今日任务全部完成</h2>
      <p class="quote" id="quoteText"></p>
      <p class="author" id="quoteAuthor"></p>
      <button class="btn-close" onclick="closeReward()">继续前行</button>
    </div>
  </div>

  <script>
    // === 数据存储 ===
    const getDay = () => new Date().toISOString().split('T')[0];
    const getStorage = (key) => JSON.parse(localStorage.getItem(key) || '{}');
    const setStorage = (key, val) => localStorage.setItem(key, JSON.stringify(val));

    let plans = getStorage('plans');
    let todos = getStorage('todos');
    let notifEnabled = localStorage.getItem('notifEnabled') === 'true';
    let notifTime = localStorage.getItem('notifTime') || '09:00';

    // 初始化
    document.addEventListener('DOMContentLoaded', () => {
      if (notifEnabled) document.getElementById('notifSwitch').classList.add('on');
      document.getElementById('notifTime').value = notifTime;
      loadPlan();
      renderTodos();
      initChart();
      checkNotifPermission();
      startNotifChecker();
      savePlan();
      renderTodos();
    });

    document.getElementById('plan').addEventListener('input', savePlan);

    // === 计划 ===
    function loadPlan() {
      const day = getDay();
      document.getElementById('plan').value = plans[day] || '';
    }
    function savePlan() {
      plans[getDay()] = document.getElementById('plan').value;
      setStorage('plans', plans);
    }

    // === 待办 ===
    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;
      const day = getDay();
      if (!todos[day]) todos[day] = [];
      todos[day].push({ id: Date.now(), text, done: false });
      input.value = '';
      setStorage('todos', todos);
      renderTodos();
      checkCompletion();
    }
    function toggleTodo(id) {
      const day = getDay();
      const t = todos[day].find(x => x.id === id);
      if (t) t.done = !t.done;
      setStorage('todos', todos);
      renderTodos();
      checkCompletion();
    }
    function deleteTodo(id) {
      const day = getDay();
      todos[day] = todos[day].filter(x => x.id !== id);
      setStorage('todos', todos);
      renderTodos();
      checkCompletion();
    }
    function renderTodos() {
      const list = document.getElementById('todoList');
      const day = getDay();
      const items = todos[day] || [];
      if (items.length === 0) {
        list.innerHTML = '<div class="empty">暂无待办，添加一个吧 ✨</div>';
      } else {
        list.innerHTML = items.map(t => `
          <div class="todo-item ${t.done ? 'done' : ''}">
            <div class="check ${t.done ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></div>
            <span style="flex:1">${t.text}</span>
            <button onclick="deleteTodo(${t.id})" style="background:none;color:var(--danger);width:auto;padding:5px 10px;">×</button>
          </div>
        `).join('');
      }
      updateStats();
    }
    function updateStats() {
      const day = getDay();
      const items = todos[day] || [];
      const total = items.length;
      const done = items.filter(t => t.done).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      document.getElementById('total').textContent = total;
      document.getElementById('done').textContent = done;
      document.getElementById('pct').textContent = pct + '%';
      document.getElementById('bar').style.width = pct + '%';
    }

    // === 统计图表 ===
    function initChart() {
      const ctx = document.getElementById('weekChart').getContext('2d');
      const labels = [];
      const data = [];
      for (let i = 6; i >= 0; i--) {
        const d = new Date(); d.setDate(d.getDate() - i);
        const key = d.toISOString().split('T')[0];
        labels.push(d.toLocaleDateString('zh-CN', {month:'short', day:'numeric'}));
        const items = todos[key] || [];
        const total = items.length;
        const done = items.filter(t => t.done).length;
        data.push(total ? Math.round((done / total) * 100) : 0);
      }
      new Chart(ctx, {
        type: 'bar',
        data: { labels, datasets: [{ label: '完成率 %', data, backgroundColor: '#667eea', borderRadius: 6 }] },
        options: { responsive: true, maintainAspectRatio: false, scales: { y: { beginAtZero: true, max: 100 } }, plugins: { legend: { display: false } } }
      });
    }

    // === 通知系统 ===
    async function checkNotifPermission() {
      if (!('Notification' in window)) return;
      if (Notification.permission === 'default') {
        // 延迟请求，避免一打开就弹窗
        setTimeout(() => Notification.requestPermission(), 2000);
      }
    }
    function toggleNotif() {
      notifEnabled = !notifEnabled;
      document.getElementById('notifSwitch').classList.toggle('on', notifEnabled);
      localStorage.setItem('notifEnabled', notifEnabled);
      if (notifEnabled && Notification.permission === 'default') Notification.requestPermission();
    }
    function saveNotif() {
      notifTime = document.getElementById('notifTime').value;
      localStorage.setItem('notifTime', notifTime);
    }
    function startNotifChecker() {
      setInterval(() => {
        if (!notifEnabled) return;
        const now = new Date();
        const timeStr = `${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
        if (timeStr === notifTime && now.getSeconds() === 0) {
          sendNotif();
        }
      }, 1000);
    }
    function sendNotif() {
      if (Notification.permission !== 'granted') return;
      const day = getDay();
      const items = todos[day] || [];
      const pending = items.filter(t => !t.done).length;
      const msg = pending ? `还有 ${pending} 个任务待完成，加油！💪` : '今日计划已清空，去休息一下吧 🌿';
      new Notification('📅 每日计划', { body: msg, icon: 'https://cdn-icons-png.flaticon.com/512/2693/2693507.png' });
    }

    // === 完成奖励 ===
    const quotes = [
      { text: '生活不能等待别人来安排，要自己去争取和奋斗。', author: '路遥《平凡的世界》', img: 'https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=600' },
      { text: '世界上只有一种真正的英雄主义，那就是在认清生活的真相后依然热爱生活。', author: '罗曼·罗兰', img: 'https://images.unsplash.com/photo-1501854140801-50d01698950b?w=600' },
      { text: '你的负担将变成礼物，你受的苦将照亮你的路。', author: '泰戈尔', img: 'https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=600' },
      { text: '我们曾如此渴望命运的波澜，到最后才发现：人生最曼妙的风景，竟是内心的淡定与从容。', author: '杨绛', img: 'https://images.unsplash.com/photo-1447752875215-b2761acb3c5d?w=600' }
    ];
    function checkCompletion() {
      const day = getDay();
      const items = todos[day] || [];
      if (items.length > 0 && items.every(t => t.done)) {
        setTimeout(() => {
          const q = quotes[Math.floor(Math.random() * quotes.length)];
          document.getElementById('quoteText').textContent = `"${q.text}"`;
          document.getElementById('quoteAuthor').textContent = q.author;
          document.getElementById('rewardImg').src = q.img;
          document.getElementById('rewardModal').classList.add('show');
        }, 600);
      }
    }
    function closeReward() {
      document.getElementById('rewardModal').classList.remove('show');
    }
    document.getElementById('rewardModal').addEventListener('click', e => {
      if (e.target.id === 'rewardModal') closeReward();
    });

    // === PWA 安装提示 ===
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js'));
    }
  </script>
</body>
</html>
