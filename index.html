<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日计划</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="每日计划">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .header {
      text-align: center;
      margin-bottom: 30px;
      padding-top: 20px;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header p {
      color: #888;
      font-size: 14px;
    }
    
    .current-date {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 25px;
      text-align: center;
    }
    
    .current-date h2 {
      font-size: 20px;
      color: #667eea;
    }
    
    .tabs {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
      background: rgba(255,255,255,0.05);
      padding: 5px;
      border-radius: 12px;
    }
    
    .tab {
      flex: 1;
      padding: 12px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 14px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }
    
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 600;
    }
    
    .calendar-container {
      display: none;
    }
    
    .calendar-container.active {
      display: block;
    }
    
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    
    .calendar-header h3 {
      font-size: 18px;
      color: #667eea;
    }
    
    .calendar-nav {
      background: rgba(102, 126, 234, 0.2);
      border: none;
      color: #667eea;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .weekday {
      text-align: center;
      padding: 10px 5px;
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }
    
    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      position: relative;
    }
    
    .day.has-plan {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: rgba(102, 126, 234, 0.5);
    }
    
    .day.today {
      border-color: #667eea;
      box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
    }
    
    .day.future {
      background: rgba(102, 126, 234, 0.1);
    }
    
    .day-number {
      font-size: 16px;
      font-weight: 600;
    }
    
    .day-indicator {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      margin-top: 2px;
    }
    
    .day.has-plan .day-indicator {
      background: rgba(255,255,255,0.8);
    }
    
    .plan-section {
      display: none;
    }
    
    .plan-section.active {
      display: block;
    }
    
    .input-group {
      margin-bottom: 20px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
    }
    
    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 14px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
    }
    
    .input-group textarea {
      min-height: 100px;
      resize: vertical;
    }
    
    .btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      margin-top: 10px;
    }
    
    .stats {
      display: flex;
      gap: 10px;
      margin-bottom: 25px;
    }
    
    .stat-card {
      flex: 1;
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 5px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #888;
    }
    
    .task-list {
      margin-top: 20px;
    }
    
    .task-item {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    
    .task-checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #667eea;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    
    .task-checkbox.checked {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .task-content {
      flex: 1;
    }
    
    .task-title {
      font-size: 15px;
      margin-bottom: 4px;
    }
    
    .task-desc {
      font-size: 13px;
      color: #888;
    }
    
    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #666;
    }
    
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #666;
    }
    
    .empty-state-icon {
      font-size: 64px;
      margin-bottom: 20px;
      opacity: 0.3;
    }
    
    .selected-date-info {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .selected-date-info h3 {
      color: #667eea;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📅 每日计划</h1>
    <p>规划每一天，遇见更好的自己</p>
  </div>
  
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">今日计划</button>
    <button class="tab" onclick="switchTab('calendar')">日历视图</button>
  </div>
  
  <!-- 今日计划 -->
  <div id="todaySection" class="plan-section active">
    <div class="current-date">
      <h2 id="currentDateDisplay"></h2>
    </div>
    
    <div class="stats">
      <div class="stat-card">
        <div class="stat-number" id="totalTasks">0</div>
        <div class="stat-label">总任务</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="completedTasks">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-card">
        <div class="stat-number" id="progressPercent">0%</div>
        <div class="stat-label">进度</div>
      </div>
    </div>
    
    <div class="input-group">
      <label>📝 写下今天的目标与心情...</label>
      <textarea id="todayMood" placeholder="今天感觉如何？有什么想记录的？"></textarea>
    </div>
    
    <div class="input-group">
      <label>✅ 添加待办事项</label>
      <input type="text" id="taskInput" placeholder="输入任务内容..." onkeypress="handleEnter(event)">
    </div>
    
    <button class="btn" onclick="addTask()">添加任务</button>
    
    <div class="task-list" id="taskList"></div>
  </div>
  
  <!-- 日历视图 -->
  <div id="calendarSection" class="calendar-container">
    <div class="calendar-header">
      <button class="calendar-nav" onclick="changeMonth(-1)">‹</button>
      <h3 id="calendarMonthYear"></h3>
      <button class="calendar-nav" onclick="changeMonth(1)">›</button>
    </div>
    
    <div class="calendar-grid">
      <div class="weekday">日</div>
      <div class="weekday">一</div>
      <div class="weekday">二</div>
      <div class="weekday">三</div>
      <div class="weekday">四</div>
      <div class="weekday">五</div>
      <div class="weekday">六</div>
    </div>
    
    <div class="calendar-grid" id="calendarDays"></div>
    
    <div id="selectedDateSection" style="display: none;">
      <div class="selected-date-info">
        <h3 id="selectedDateText"></h3>
      </div>
      
      <div class="input-group">
        <label>📝 计划内容</label>
        <textarea id="selectedDatePlan" placeholder="这一天有什么计划？"></textarea>
      </div>
      
      <div class="input-group">
        <label>✅ 待办事项</label>
        <input type="text" id="selectedDateTask" placeholder="添加任务..." onkeypress="handleSelectedDateEnter(event)">
      </div>
      
      <button class="btn" onclick="saveSelectedDatePlan()">保存计划</button>
      <button class="btn btn-secondary" onclick="closeSelectedDate()">关闭</button>
      
      <div class="task-list" id="selectedDateTaskList"></div>
    </div>
  </div>

  <script>
    // 全局变量
    let currentDate = new Date();
    let selectedDate = null;
    let currentMonth = new Date();
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      updateDateDisplay();
      loadTodayData();
      renderCalendar();
      
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    });
    
    // 切换标签
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.plan-section').forEach(s => s.classList.remove('active'));
      document.querySelectorAll('.calendar-container').forEach(c => c.classList.remove('active'));
      
      if (tab === 'today') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('todaySection').classList.add('active');
        loadTodayData();
      } else {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('calendarSection').classList.add('active');
        renderCalendar();
      }
    }
    
    // 更新日期显示
    function updateDateDisplay() {
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('currentDateDisplay').textContent = currentDate.toLocaleDateString('zh-CN', options);
    }
    
    // 渲染日历
    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      
      const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                         '七月', '八月', '九月', '十月', '十一月', '十二月'];
      document.getElementById('calendarMonthYear').textContent = `${year}年${monthNames[month]}`;
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      
      const calendarDays = document.getElementById('calendarDays');
      calendarDays.innerHTML = '';
      
      // 空白占位
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        calendarDays.appendChild(empty);
      }
      
      // 日期
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        
        // 检查是否是今天
        if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
          dayEl.classList.add('today');
        }
        
        // 检查是否是未来日期
        const thisDate = new Date(year, month, day);
        if (thisDate > today) {
          dayEl.classList.add('future');
        }
        
        // 检查是否有计划
        const plans = JSON.parse(localStorage.getItem('plans') || '{}');
        if (plans[dateStr]) {
          dayEl.classList.add('has-plan');
        }
        
        dayEl.innerHTML = `
          <div class="day-number">${day}</div>
          ${plans[dateStr] ? '<div class="day-indicator"></div>' : ''}
        `;
        
        dayEl.onclick = () => selectDate(dateStr, day);
        calendarDays.appendChild(dayEl);
      }
    }
    
    // 选择日期
    function selectDate(dateStr, day) {
      selectedDate = dateStr;
      const dateObj = new Date(dateStr);
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('selectedDateText').textContent = dateObj.toLocaleDateString('zh-CN', options);
      
      document.getElementById('selectedDateSection').style.display = 'block';
      loadSelectedDateData();
      
      // 滚动到该区域
      document.getElementById('selectedDateSection').scrollIntoView({ behavior: 'smooth' });
    }
    
    // 关闭选择日期
    function closeSelectedDate() {
      document.getElementById('selectedDateSection').style.display = 'none';
      selectedDate = null;
      renderCalendar();
    }
    
    // 切换月份
    function changeMonth(delta) {
      currentMonth.setMonth(currentMonth.getMonth() + delta);
      renderCalendar();
    }
    
    // 加载今日数据
    function loadTodayData() {
      const today = getTodayStr();
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      const todayData = data[today] || { mood: '', tasks: [] };
      
      document.getElementById('todayMood').value = todayData.mood || '';
      renderTaskList(todayData.tasks || [], 'taskList');
      updateStats(todayData.tasks || []);
    }
    
    // 加载选择日期的数据
    function loadSelectedDateData() {
      if (!selectedDate) return;
      
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      const dateData = data[selectedDate] || { plan: '', tasks: [] };
      
      document.getElementById('selectedDatePlan').value = dateData.plan || '';
      renderTaskList(dateData.tasks || [], 'selectedDateTaskList');
    }
    
    // 渲染任务列表
    function renderTaskList(tasks, containerId) {
      const container = document.getElementById(containerId);
      
      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>暂无待办，添加一个吧 ✨</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = tasks.map((task, index) => `
        <div class="task-item ${task.completed ? 'completed' : ''}" onclick="toggleTask(${index}, '${containerId}')">
          <div class="task-checkbox ${task.completed ? 'checked' : ''}">
            ${task.completed ? '✓' : ''}
          </div>
          <div class="task-content">
            <div class="task-title">${escapeHtml(task.title)}</div>
            ${task.desc ? `<div class="task-desc">${escapeHtml(task.desc)}</div>` : ''}
          </div>
        </div>
      `).join('');
    }
    
    // 更新统计
    function updateStats(tasks) {
      const total = tasks.length;
      const completed = tasks.filter(t => t.completed).length;
      const percent = total === 0 ? 0 : Math.round((completed / total) * 100);
      
      document.getElementById('totalTasks').textContent = total;
      document.getElementById('completedTasks').textContent = completed;
      document.getElementById('progressPercent').textContent = percent + '%';
    }
    
    // 添加任务
    function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      
      if (!title) {
        alert('请输入任务内容');
        return;
      }
      
      const today = getTodayStr();
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[today]) {
        data[today] = { mood: '', tasks: [] };
      }
      
      data[today].tasks.push({
        title: title,
        desc: '',
        completed: false
      });
      
      localStorage.setItem('plans', JSON.stringify(data));
      input.value = '';
      loadTodayData();
    }
    
    // 保存选择日期的计划
    function saveSelectedDatePlan() {
      if (!selectedDate) return;
      
      const plan = document.getElementById('selectedDatePlan').value.trim();
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[selectedDate]) {
        data[selectedDate] = { plan: '', tasks: [] };
      }
      
      data[selectedDate].plan = plan;
      
      localStorage.setItem('plans', JSON.stringify(data));
      alert('计划已保存！');
      renderCalendar();
    }
    
    // 切换任务完成状态
    function toggleTask(index, containerId) {
      const date = containerId === 'taskList' ? getTodayStr() : selectedDate;
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (data[date] && data[date].tasks[index]) {
        data[date].tasks[index].completed = !data[date].tasks[index].completed;
        localStorage.setItem('plans', JSON.stringify(data));
        
        if (containerId === 'taskList') {
          loadTodayData();
        } else {
          loadSelectedDateData();
        }
      }
    }
    
    // 获取今日字符串
    function getTodayStr() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }
    
    // 处理回车键
    function handleEnter(event) {
      if (event.key === 'Enter') {
        addTask();
      }
    }
    
    function handleSelectedDateEnter(event) {
      if (event.key === 'Enter') {
        const input = document.getElementById('selectedDateTask');
        const title = input.value.trim();
        
        if (!title) return;
        
        const data = JSON.parse(localStorage.getItem('plans') || '{}');
        if (!data[selectedDate]) {
          data[selectedDate] = { plan: '', tasks: [] };
        }
        
        data[selectedDate].tasks.push({
          title: title,
          desc: '',
          completed: false
        });
        
        localStorage.setItem('plans', JSON.stringify(data));
        input.value = '';
        loadSelectedDateData();
        renderCalendar();
      }
    }
    
    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
