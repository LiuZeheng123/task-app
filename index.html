<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日计划</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="每日计划">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 20px;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header p {
      color: #888;
      font-size: 14px;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.05);
      padding: 5px;
      border-radius: 12px;
    }
    
    .tab {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }
    
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 600;
    }
    
    .section {
      display: none;
    }
    
    .section.active {
      display: block;
    }
    
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .stat-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #888;
    }
    
    .chart-container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .chart-title {
      font-size: 16px;
      margin-bottom: 15px;
      color: #667eea;
      text-align: center;
    }
    
    .circular-chart {
      display: block;
      margin: 0 auto;
      max-width: 200px;
      max-height: 200px;
    }
    
    .circle-bg {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 2.5;
    }
    
    .circle {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      transition: all 0.3s;
    }
    
    .percentage {
      fill: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: bold;
      font-size: 0.5em;
      text-anchor: middle;
    }
    
    .heatmap-container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .heatmap-title {
      font-size: 16px;
      margin-bottom: 15px;
      color: #667eea;
    }
    
    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    
    .heatmap-day {
      aspect-ratio: 1;
      border-radius: 4px;
      background: rgba(102, 126, 234, 0.1);
      transition: all 0.2s;
    }
    
    .heatmap-day.level-0 { background: rgba(102, 126, 234, 0.1); }
    .heatmap-day.level-1 { background: rgba(102, 126, 234, 0.3); }
    .heatmap-day.level-2 { background: rgba(102, 126, 234, 0.5); }
    .heatmap-day.level-3 { background: rgba(102, 126, 234, 0.7); }
    .heatmap-day.level-4 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    
    .calendar-container {
      display: none;
    }
    
    .calendar-container.active {
      display: block;
    }
    
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    
    .calendar-header h3 {
      font-size: 18px;
      color: #667eea;
    }
    
    .calendar-nav {
      background: rgba(102, 126, 234, 0.2);
      border: none;
      color: #667eea;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .weekday {
      text-align: center;
      padding: 10px 5px;
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }
    
    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      position: relative;
    }
    
    .day.has-plan {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: rgba(102, 126, 234, 0.5);
    }
    
    .day.today {
      border-color: #667eea;
      box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
    }
    
    .day.future {
      background: rgba(102, 126, 234, 0.1);
    }
    
    .day-number {
      font-size: 16px;
      font-weight: 600;
    }
    
    .day-indicator {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      margin-top: 2px;
    }
    
    .current-date {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .current-date h2 {
      font-size: 20px;
      color: #667eea;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
    }
    
    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
    }
    
    .input-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      margin-top: 10px;
    }
    
    .task-list {
      margin-top: 15px;
    }
    
    .task-item {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }
    
    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #667eea;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
    }
    
    .task-checkbox.checked {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .task-content {
      flex: 1;
    }
    
    .task-title {
      font-size: 14px;
      margin-bottom: 3px;
    }
    
    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #666;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.3;
    }
    
    .selected-date-info {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .selected-date-info h3 {
      color: #667eea;
      font-size: 16px;
    }
    
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 15px;
    }
    
    /* 🔥 烟花层级调整：确保叠在弹窗内容之上 */
    #fireworksCanvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none; /* 点击穿透，不影响按钮 */
      z-index: 10000; /* 最高层级 */
    }
    
    .celebration-modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(15px);
      z-index: 9000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .celebration-modal.active {
      display: flex;
      animation: fadeIn 0.5s ease;
    }
    
    .celebration-content {
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-radius: 24px;
      max-width: 400px;
      width: 100%;
      overflow: hidden;
      border: 1px solid rgba(102, 126, 234, 0.4);
      box-shadow: 0 0 50px rgba(102, 126, 234, 0.3), 0 20px 60px rgba(0, 0, 0, 0.6);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      z-index: 9001; /* 低于烟花，高于背景 */
    }
    
    .celebration-image {
      width: 100%;
      height: 200px;
      object-fit: cover;
      display: block;
      border-bottom: 1px solid rgba(255,255,255,0.1);
      /* 🔥 图片加载失败时的保底背景 */
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .celebration-text {
      padding: 25px;
      text-align: center;
    }
    
    .celebration-quote {
      font-size: 18px;
      line-height: 1.6;
      color: #fff;
      margin-bottom: 15px;
      font-style: italic;
      font-weight: 500;
    }
    
    .celebration-author {
      font-size: 14px;
      color: #8899ff;
      margin-bottom: 25px;
      font-weight: 600;
    }
    
    .celebration-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      padding: 12px 40px;
      border-radius: 30px;
      color: #fff;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
    }
    
    .celebration-btn:active {
      transform: scale(0.96);
    }
    
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slideUp {
      from { 
        opacity: 0;
        transform: translateY(80px) scale(0.9);
      }
      to { 
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📅 每日计划</h1>
    <p>规划每一天，遇见更好的自己</p>
  </div>
  
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">今日</button>
    <button class="tab" onclick="switchTab('calendar')">日历</button>
    <button class="tab" onclick="switchTab('stats')">统计</button>
  </div>
  
  <!-- 今日计划 -->
  <div id="todaySection" class="section active">
    <div class="current-date">
      <h2 id="currentDateDisplay"></h2>
    </div>
    
    <div id="streakContainer" style="text-align: center; margin-bottom: 15px;"></div>
    
    <div class="input-group">
      <label>📝 写下今天的目标与心情...</label>
      <textarea id="todayMood" placeholder="今天感觉如何？有什么想记录的？" onchange="saveMood()"></textarea>
    </div>
    
    <div class="input-group">
      <label>✅ 添加待办事项</label>
      <input type="text" id="taskInput" placeholder="输入任务内容..." onkeypress="handleEnter(event)">
    </div>
    
    <button class="btn" onclick="addTask()">添加任务</button>
    
    <div class="task-list" id="taskList"></div>
  </div>
  
  <!-- 日历视图 -->
  <div id="calendarSection" class="calendar-container section">
    <div class="calendar-header">
      <button class="calendar-nav" onclick="changeMonth(-1)">‹</button>
      <h3 id="calendarMonthYear"></h3>
      <button class="calendar-nav" onclick="changeMonth(1)">›</button>
    </div>
    
    <div class="calendar-grid">
      <div class="weekday">日</div>
      <div class="weekday">一</div>
      <div class="weekday">二</div>
      <div class="weekday">三</div>
      <div class="weekday">四</div>
      <div class="weekday">五</div>
      <div class="weekday">六</div>
    </div>
    
    <div class="calendar-grid" id="calendarDays"></div>
    
    <div id="selectedDateSection" style="display: none;">
      <div class="selected-date-info">
        <h3 id="selectedDateText"></h3>
      </div>
      
      <div class="input-group">
        <label>📝 计划内容</label>
        <textarea id="selectedDatePlan" placeholder="这一天有什么计划？" onchange="saveSelectedDatePlan()"></textarea>
      </div>
      
      <div class="input-group">
        <label>✅ 待办事项</label>
        <input type="text" id="selectedDateTask" placeholder="添加任务..." onkeypress="handleSelectedDateEnter(event)">
      </div>
      
      <button class="btn btn-secondary" onclick="closeSelectedDate()">关闭</button>
      
      <div class="task-list" id="selectedDateTaskList"></div>
    </div>
  </div>
  
  <!-- 统计视图 -->
  <div id="statsSection" class="section">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-number" id="streakDays">0</div>
        <div class="stat-label">连续打卡</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-number" id="totalCompleted">0</div>
        <div class="stat-label">总完成</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-number" id="weekCompletion">0%</div>
        <div class="stat-label">本周完成率</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div class="stat-number" id="monthTasks">0</div>
        <div class="stat-label">本月任务</div>
      </div>
    </div>
    
    <div class="chart-container">
      <div class="chart-title">本周完成率</div>
      <svg viewBox="0 0 36 36" class="circular-chart">
        <path class="circle-bg"
          d="M18 2.0845
            a 15.9155 15.9155 0 0 1 0 31.831
            a 15.9155 15.9155 0 0 1 0 -31.831"
        />
        <path class="circle"
          stroke="#667eea"
          stroke-dasharray="0, 100"
          id="completionCircle"
          d="M18 2.0845
            a 15.9155 15.9155 0 0 1 0 31.831
            a 15.9155 15.9155 0 0 1 0 -31.831"
        />
        <text x="18" y="20.35" class="percentage" id="completionText">0%</text>
      </svg>
    </div>
    
    <div class="heatmap-container">
      <div class="heatmap-title">📅 近 35 天活跃度</div>
      <div class="heatmap" id="heatmap"></div>
    </div>
  </div>

  <!-- 庆祝弹窗 -->
  <div class="celebration-modal" id="celebrationModal">
    <div class="celebration-content">
      <!-- 🔥 添加 onerror 自动隐藏裂图 -->
      <img class="celebration-image" id="celebrationImage" src="" alt="励志图片" onerror="this.style.display='none'">
      <div class="celebration-text">
        <div class="celebration-quote" id="celebrationQuote"></div>
        <div class="celebration-author" id="celebrationAuthor"></div>
        <button class="celebration-btn" onclick="closeCelebration()">🎉 我做到了！</button>
      </div>
    </div>
  </div>

  <!-- 添加自定义名言弹窗 -->
  <div class="celebration-modal" id="customQuoteModal">
    <div class="celebration-content" style="max-width: 350px;">
      <div class="celebration-text">
        <h3 style="margin-bottom: 20px; color: #667eea;">✨ 添加名言</h3>
        <div class="input-group" style="margin-bottom: 15px;">
          <input type="text" id="customQuoteText" placeholder="输入名言内容..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff;">
        </div>
        <div class="input-group" style="margin-bottom: 15px;">
          <input type="text" id="customQuoteAuthor" placeholder="作者（可选）..." style="width: 100%; padding: 10px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.05); color: #fff;">
        </div>
        <div style="display: flex; gap: 10px;">
          <button class="celebration-btn" onclick="saveCustomQuote()" style="flex: 1;">保存</button>
          <button class="celebration-btn" onclick="closeCustomQuoteModal()" style="flex: 1; background: rgba(255,255,255,0.1);">取消</button>
        </div>
      </div>
    </div>
  </div>

  <!-- 烟花 Canvas 画布 -->
  <canvas id="fireworksCanvas"></canvas>
  
  <!-- 悬浮按钮：添加名言 -->
  <button onclick="openCustomQuoteModal()" style="position: fixed; bottom: 20px; right: 20px; width: 56px; height: 56px; border-radius: 50%; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border: none; color: #fff; font-size: 24px; cursor: pointer; box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4); display: flex; align-items: center; justify-content: center; z-index: 100;">
    ✍️
  </button>

  <script>
    // 文学名言库（持续扩展中...）
    const literaryQuotes = [
      { text: "生活不是等待暴风雨过去，而是学会在雨中翩翩起舞。", author: "—— 维维安·格林", image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop&q=60" },
      { text: "每一个不曾起舞的日子，都是对生命的辜负。", author: "—— 尼采", image: "https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=400&h=300&fit=crop&q=60" },
      { text: "当你穿过了暴风雨，你就不再是原来那个人了。", author: "—— 村上春树", image: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=300&fit=crop&q=60" },
      { text: "世界上只有一种真正的英雄主义，那就是在认清生活的真相后依然热爱生活。", author: "—— 罗曼·罗兰", image: "https://images.unsplash.com/photo-1470071459604-3b5ec3a7fe05?w=400&h=300&fit=crop&q=60" },
      { text: "人不是为失败而生的，一个人可以被毁灭，但不能被打败。", author: "—— 海明威", image: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=400&h=300&fit=crop&q=60" },
      { text: "你要做一个不动声色的大人了。不准情绪化，不准偷偷想念，不准回头看。", author: "—— 村上春树", image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=300&fit=crop&q=60" },
      { text: "我们终此一生，就是要摆脱他人的期待，找到真正的自己。", author: "—— 伍绮诗", image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&h=300&fit=crop&q=60" },
      { text: "愿你一生努力，一生被爱，想要的都拥有，得不到的都释怀。", author: "—— 八月长安", image: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=300&fit=crop&q=60" },
      { text: "黑夜无论怎样悠长，白昼总会到来。", author: "—— 莎士比亚", image: "https://images.unsplash.com/photo-1472214103451-9374bd1c798e?w=400&h=300&fit=crop&q=60" },
      { text: "所谓无底深渊，下去，也是前程万里。", author: "—— 木心", image: "https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=300&fit=crop&q=60" },
      { text: "生活不可能像你想象得那么好，但也不会像你想象得那么糟。", author: "—— 莫泊桑", image: "https://images.unsplash.com/photo-1475924156734-496f6cac6ec1?w=400&h=300&fit=crop&q=60" },
      { text: "且视他人之疑目如盏盏鬼火，大胆地去走你的夜路。", author: "—— 史铁生", image: "https://images.unsplash.com/photo-1519681393784-d120267933ba?w=400&h=300&fit=crop&q=60" },
      { text: "我来不及认真地年轻，待明白过来时，只能选择认真地老去。", author: "—— 三毛", image: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=300&fit=crop&q=60" },
      { text: "如果你认识从前的我，那么你就会原谅现在的我。", author: "—— 张爱玲", image: "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=400&h=300&fit=crop&q=60" },
      { text: "于千万人之中遇见你所要遇见的人，于千万年之中，时间的无涯的荒野里。", author: "—— 张爱玲", image: "https://images.unsplash.com/photo-1518621736915-f3b1ffd29c3b?w=400&h=300&fit=crop&q=60" },
      { text: "人生若只如初见，何事秋风悲画扇。", author: "—— 纳兰性德", image: "https://images.unsplash.com/photo-1499938701117-10c97a78c620?w=400&h=300&fit=crop&q=60" },
      { text: "曾经沧海难为水，除却巫山不是云。", author: "—— 元稹", image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop&q=60" },
      { text: "两情若是久长时，又岂在朝朝暮暮。", author: "—— 秦观", image: "https://images.unsplash.com/photo-1518621736915-f3b1ffd29c3b?w=400&h=300&fit=crop&q=60" },
      { text: "衣带渐宽终不悔，为伊消得人憔悴。", author: "—— 柳永", image: "https://images.unsplash.com/photo-1496568816309-51d71e5731b9?w=400&h=300&fit=crop&q=60" },
      { text: "众里寻他千百度，蓦然回首，那人却在灯火阑珊处。", author: "—— 辛弃疾", image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=300&fit=crop&q=60" },
      { text: "天生我材必有用，千金散尽还复来。", author: "—— 李白", image: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=400&h=300&fit=crop&q=60" },
      { text: "长风破浪会有时，直挂云帆济沧海。", author: "—— 李白", image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=300&fit=crop&q=60" },
      { text: "海内存知己，天涯若比邻。", author: "—— 王勃", image: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=300&fit=crop&q=60" },
      { text: "会当凌绝顶，一览众山小。", author: "—— 杜甫", image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&h=300&fit=crop&q=60" },
      { text: "采菊东篱下，悠然见南山。", author: "—— 陶渊明", image: "https://images.unsplash.com/photo-1490750967860-bc9254f40e2a?w=400&h=300&fit=crop&q=60" },
      { text: "山重水复疑无路，柳暗花明又一村。", author: "—— 陆游", image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=300&fit=crop&q=60" },
      { text: "问渠那得清如许，为有源头活水来。", author: "—— 朱熹", image: "https://images.unsplash.com/photo-1433086966358-54859d0ed716?w=400&h=300&fit=crop&q=60" },
      { text: "不识庐山真面目，只缘身在此山中。", author: "—— 苏轼", image: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=300&fit=crop&q=60" },
      { text: "欲把西湖比西子，淡妆浓抹总相宜。", author: "—— 苏轼", image: "https://images.unsplash.com/photo-1501785888041-af3ef285b470?w=400&h=300&fit=crop&q=60" },
      { text: "竹杖芒鞋轻胜马，谁怕？一蓑烟雨任平生。", author: "—— 苏轼", image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop&q=60" },
      { text: "人生到处知何似，应似飞鸿踏雪泥。", author: "—— 苏轼", image: "https://images.unsplash.com/photo-1499938701117-10c97a78c620?w=400&h=300&fit=crop&q=60" },
      { text: "十年生死两茫茫，不思量，自难忘。", author: "—— 苏轼", image: "https://images.unsplash.com/photo-1518621736915-f3b1ffd29c3b?w=400&h=300&fit=crop&q=60" },
      { text: "此情可待成追忆，只是当时已惘然。", author: "—— 李商隐", image: "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=400&h=300&fit=crop&q=60" },
      { text: "身无彩凤双飞翼，心有灵犀一点通。", author: "—— 李商隐", image: "https://images.unsplash.com/photo-1496568816309-51d71e5731b9?w=400&h=300&fit=crop&q=60" },
      { text: "春蚕到死丝方尽，蜡炬成灰泪始干。", author: "—— 李商隐", image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=300&fit=crop&q=60" },
      { text: "同是天涯沦落人，相逢何必曾相识。", author: "—— 白居易", image: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=400&h=300&fit=crop&q=60" },
      { text: "在天愿作比翼鸟，在地愿为连理枝。", author: "—— 白居易", image: "https://images.unsplash.com/photo-1518621736915-f3b1ffd29c3b?w=400&h=300&fit=crop&q=60" },
      { text: "天长地久有时尽，此恨绵绵无绝期。", author: "—— 白居易", image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=300&fit=crop&q=60" },
      { text: "路漫漫其修远兮，吾将上下而求索。", author: "—— 屈原", image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&h=300&fit=crop&q=60" },
      { text: "亦余心之所善兮，虽九死其犹未悔。", author: "—— 屈原", image: "https://images.unsplash.com/photo-1441974231531-c6227db76b6e?w=400&h=300&fit=crop&q=60" },
      { text: "生当作人杰，死亦为鬼雄。", author: "—— 李清照", image: "https://images.unsplash.com/photo-1506905925346-21bda4d32df4?w=400&h=300&fit=crop&q=60" },
      { text: "寻寻觅觅，冷冷清清，凄凄惨惨戚戚。", author: "—— 李清照", image: "https://images.unsplash.com/photo-1499938701117-10c97a78c620?w=400&h=300&fit=crop&q=60" },
      { text: "花自飘零水自流，一种相思，两处闲愁。", author: "—— 李清照", image: "https://images.unsplash.com/photo-1518621736915-f3b1ffd29c3b?w=400&h=300&fit=crop&q=60" },
      { text: "此情无计可消除，才下眉头，却上心头。", author: "—— 李清照", image: "https://images.unsplash.com/photo-1516589178581-6cd7833ae3b2?w=400&h=300&fit=crop&q=60" },
      { text: "知否，知否？应是绿肥红瘦。", author: "—— 李清照", image: "https://images.unsplash.com/photo-1496568816309-51d71e5731b9?w=400&h=300&fit=crop&q=60" },
      { text: "我见青山多妩媚，料青山见我应如是。", author: "—— 辛弃疾", image: "https://images.unsplash.com/photo-1469474968028-56623f02e42e?w=400&h=300&fit=crop&q=60" },
      { text: "想当年，金戈铁马，气吞万里如虎。", author: "—— 辛弃疾", image: "https://images.unsplash.com/photo-1505142468610-359e7d316be0?w=400&h=300&fit=crop&q=60" },
      { text: "昨夜西风凋碧树，独上高楼，望尽天涯路。", author: "—— 晏殊", image: "https://images.unsplash.com/photo-1514525253161-7a46d19cd819?w=400&h=300&fit=crop&q=60" },
      { text: "无可奈何花落去，似曾相识燕归来。", author: "—— 晏殊", image: "https://images.unsplash.com/photo-1490750967860-bc9254f40e2a?w=400&h=300&fit=crop&q=60" },
      { text: "多情自古伤离别，更那堪冷落清秋节。", author: "—— 柳永", image: "https://images.unsplash.com/photo-1507525428034-b723cf961d3e?w=400&h=300&fit=crop&q=60" },
      { text: "今宵酒醒何处？杨柳岸，晓风残月。", author: "—— 柳永", image: "https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=400&h=300&fit=crop&q=60" }
    ];

    let currentDate = new Date();
    let selectedDate = null;
    let currentMonth = new Date();
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      updateDateDisplay();
      loadTodayData();
      renderCalendar();
      renderStats();
      
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    });

    // 🔥 离线图片预加载
    window.addEventListener('load', () => {
      const uniqueImages = [...new Set(literaryQuotes.map(q => q.image))];
      uniqueImages.forEach(url => {
        const img = new Image();
        img.src = url;
      });
    });
    
    // 切换标签
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      
      if (tab === 'today') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('todaySection').classList.add('active');
        loadTodayData();
      } else if (tab === 'calendar') {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('calendarSection').classList.add('active');
        renderCalendar();
      } else {
        document.querySelector('.tab:nth-child(3)').classList.add('active');
        document.getElementById('statsSection').classList.add('active');
        renderStats();
      }
    }
    
    // 更新日期显示
    function updateDateDisplay() {
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('currentDateDisplay').textContent = currentDate.toLocaleDateString('zh-CN', options);
    }
    
    // 渲染统计
    function renderStats() {
      const plans = JSON.parse(localStorage.getItem('plans') || '{}');
      const today = new Date();
      
      // 计算连续打卡天数
      let streak = 0;
      let checkDate = new Date(today);
      while (true) {
        const dateStr = formatDate(checkDate);
        if (plans[dateStr] && plans[dateStr].tasks && plans[dateStr].tasks.length > 0) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }
      document.getElementById('streakDays').textContent = streak;
      
      if (streak > 0) {
        document.getElementById('streakContainer').innerHTML = `
          <div class="streak-badge">
            🔥 已连续打卡 ${streak} 天
          </div>
        `;
      } else {
        document.getElementById('streakContainer').innerHTML = '';
      }
      
      // 计算总完成任务数
      let totalCompleted = 0;
      Object.values(plans).forEach(day => {
        if (day.tasks) {
          totalCompleted += day.tasks.filter(t => t.completed).length;
        }
      });
      document.getElementById('totalCompleted').textContent = totalCompleted;
      
      // 计算本周完成率
      const weekData = getWeekData();
      const weekTotal = weekData.reduce((sum, day) => sum + (day.total || 0), 0);
      const weekCompleted = weekData.reduce((sum, day) => sum + (day.completed || 0), 0);
      const weekPercent = weekTotal === 0 ? 0 : Math.round((weekCompleted / weekTotal) * 100);
      document.getElementById('weekCompletion').textContent = weekPercent + '%';
      
      updateCircularChart(weekPercent);
      
      // 计算本月任务数
      const monthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      let monthTasks = 0;
      Object.keys(plans).forEach(date => {
        if (date.startsWith(monthStr) && plans[date].tasks) {
          monthTasks += plans[date].tasks.length;
        }
      });
      document.getElementById('monthTasks').textContent = monthTasks;
      
      renderHeatmap();
    }
    
    // 获取本周数据
    function getWeekData() {
      const today = new Date();
      const weekData = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = formatDate(date);
        const plans = JSON.parse(localStorage.getItem('plans') || '{}');
        const dayData = plans[dateStr] || { tasks: [] };
        const total = dayData.tasks ? dayData.tasks.length : 0;
        const completed = dayData.tasks ? dayData.tasks.filter(t => t.completed).length : 0;
        weekData.push({ date: dateStr, total, completed });
      }
      return weekData;
    }
    
    // 更新环形图
    function updateCircularChart(percent) {
      const circle = document.getElementById('completionCircle');
      const text = document.getElementById('completionText');
      circle.setAttribute('stroke-dasharray', `${percent}, 100`);
      text.textContent = `${percent}%`;
    }
    
    // 渲染热力图
    function renderHeatmap() {
      const heatmap = document.getElementById('heatmap');
      heatmap.innerHTML = '';
      
      const plans = JSON.parse(localStorage.getItem('plans') || '{}');
      const today = new Date();
      
      for (let i = 34; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = formatDate(date);
        const dayData = plans[dateStr] || { tasks: [] };
        const taskCount = dayData.tasks ? dayData.tasks.length : 0;
        
        const day = document.createElement('div');
        day.className = 'heatmap-day';
        
        if (taskCount === 0) {
          day.classList.add('level-0');
        } else if (taskCount <= 2) {
          day.classList.add('level-1');
        } else if (taskCount <= 4) {
          day.classList.add('level-2');
        } else if (taskCount <= 6) {
          day.classList.add('level-3');
        } else {
          day.classList.add('level-4');
        }
        
        day.title = `${dateStr}: ${taskCount} 个任务`;
        heatmap.appendChild(day);
      }
    }
    
    // 格式化日期
    function formatDate(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }
    
    // 渲染日历
    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      
      const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                         '七月', '八月', '九月', '十月', '十一月', '十二月'];
      document.getElementById('calendarMonthYear').textContent = `${year}年${monthNames[month]}`;
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      
      const calendarDays = document.getElementById('calendarDays');
      calendarDays.innerHTML = '';
      
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        calendarDays.appendChild(empty);
      }
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        
        if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
          dayEl.classList.add('today');
        }
        
        const thisDate = new Date(year, month, day);
        if (thisDate > today) {
          dayEl.classList.add('future');
        }
        
        const plans = JSON.parse(localStorage.getItem('plans') || '{}');
        if (plans[dateStr]) {
          dayEl.classList.add('has-plan');
        }
        
        dayEl.innerHTML = `
          <div class="day-number">${day}</div>
          ${plans[dateStr] ? '<div class="day-indicator"></div>' : ''}
        `;
        
        dayEl.onclick = () => selectDate(dateStr, day);
        calendarDays.appendChild(dayEl);
      }
    }
    
    // 选择日期
    function selectDate(dateStr, day) {
      selectedDate = dateStr;
      const dateObj = new Date(dateStr);
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('selectedDateText').textContent = dateObj.toLocaleDateString('zh-CN', options);
      
      document.getElementById('selectedDateSection').style.display = 'block';
      loadSelectedDateData();
      document.getElementById('selectedDateSection').scrollIntoView({ behavior: 'smooth' });
    }
    
    // 关闭选择日期
    function closeSelectedDate() {
      document.getElementById('selectedDateSection').style.display = 'none';
      selectedDate = null;
      renderCalendar();
    }
    
    // 切换月份
    function changeMonth(delta) {
      currentMonth.setMonth(currentMonth.getMonth() + delta);
      renderCalendar();
    }
    
    // 加载今日数据
    function loadTodayData() {
      const today = getTodayStr();
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      const todayData = data[today] || { mood: '', tasks: [] };
      
      document.getElementById('todayMood').value = todayData.mood || '';
      renderTaskList(todayData.tasks || [], 'taskList');
    }
    
    // 保存心情
    function saveMood() {
      const today = getTodayStr();
      const mood = document.getElementById('todayMood').value;
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[today]) {
        data[today] = { mood: '', tasks: [] };
      }
      
      data[today].mood = mood;
      localStorage.setItem('plans', JSON.stringify(data));
    }
    
    // 加载选择日期的数据
    function loadSelectedDateData() {
      if (!selectedDate) return;
      
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      const dateData = data[selectedDate] || { plan: '', tasks: [] };
      
      document.getElementById('selectedDatePlan').value = dateData.plan || '';
      renderTaskList(dateData.tasks || [], 'selectedDateTaskList');
    }
    
    // 保存选择日期的计划
    function saveSelectedDatePlan() {
      if (!selectedDate) return;
      
      const plan = document.getElementById('selectedDatePlan').value;
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[selectedDate]) {
        data[selectedDate] = { plan: '', tasks: [] };
      }
      
      data[selectedDate].plan = plan;
      localStorage.setItem('plans', JSON.stringify(data));
      renderCalendar();
    }
    
    // 渲染任务列表
    function renderTaskList(tasks, containerId) {
      const container = document.getElementById(containerId);
      
      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>暂无待办，添加一个吧 ✨</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = tasks.map((task, index) => `
        <div class="task-item ${task.completed ? 'completed' : ''}" onclick="toggleTask(${index}, '${containerId}')">
          <div class="task-checkbox ${task.completed ? 'checked' : ''}">
            ${task.completed ? '✓' : ''}
          </div>
          <div class="task-content">
            <div class="task-title">${escapeHtml(task.title)}</div>
          </div>
        </div>
      `).join('');
    }
    
    // 添加任务
    function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      
      if (!title) {
        alert('请输入任务内容');
        return;
      }
      
      const today = getTodayStr();
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[today]) {
        data[today] = { mood: '', tasks: [] };
      }
      
      data[today].tasks.push({
        title: title,
        completed: false
      });
      
      localStorage.setItem('plans', JSON.stringify(data));
      input.value = '';
      loadTodayData();
      renderStats();
    }
    
    // 切换任务完成状态
    function toggleTask(index, containerId) {
      const date = containerId === 'taskList' ? getTodayStr() : selectedDate;
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (data[date] && data[date].tasks[index]) {
        data[date].tasks[index].completed = !data[date].tasks[index].completed;
        localStorage.setItem('plans', JSON.stringify(data));
        
        if (containerId === 'taskList') {
          loadTodayData();
          renderStats();
          
          const tasks = data[date].tasks;
          const allCompleted = tasks.length > 0 && tasks.every(t => t.completed);
          
          if (allCompleted) {
            showCelebration();
          }
        } else {
          loadSelectedDateData();
          renderCalendar();
          renderStats();
        }
      }
    }
    
    // ================= 烟花特效核心代码 =================
    const canvas = document.getElementById('fireworksCanvas');
    const ctx = canvas.getContext('2d');
    let particles = [];
    let fireworksActive = false;
    let animationId;

    // 设置 Canvas 尺寸
    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // 粒子类
    class Particle {
      constructor(x, y, color) {
        this.x = x;
        this.y = y;
        this.color = color;
        this.size = Math.random() * 2.5 + 1; // 🔥 粒子大小随机
        // 爆炸速度
        const angle = Math.random() * Math.PI * 2;
        const velocity = Math.random() * 6 + 3; // 🔥 速度加快
        this.vx = Math.cos(angle) * velocity;
        this.vy = Math.sin(angle) * velocity;
        this.alpha = 1;
        this.decay = Math.random() * 0.015 + 0.012;
        this.gravity = 0.06;
      }

      update() {
        this.vx *= 0.96; // 空气阻力
        this.vy *= 0.96;
        this.vy += this.gravity;
        this.x += this.vx;
        this.y += this.vy;
        this.alpha -= this.decay;
      }

      draw() {
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = this.color;
        ctx.fill();
        // 🔥 发光效果
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.restore();
      }
    }

    // 创建烟花爆炸
    function createExplosion(x, y) {
      const colors = ['#667eea', '#764ba2', '#f093fb', '#f5576c', '#4facfe', '#00f2fe', '#ffd700', '#ff6b6b', '#ffffff'];
      const color = colors[Math.floor(Math.random() * colors.length)];
      const count = 120; // 🔥 粒子数量翻倍
      
      for (let i = 0; i < count; i++) {
        particles.push(new Particle(x, y, color));
      }
    }

    // 动画循环
    function animate() {
      if (!fireworksActive && particles.length === 0) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        return;
      }

      // 🔥 拖尾效果更明显
      ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 随机发射烟花
      if (fireworksActive && Math.random() < 0.08) {
        createExplosion(
          Math.random() * canvas.width,
          Math.random() * canvas.height * 0.5 + 100
        );
      }

      for (let i = particles.length - 1; i >= 0; i--) {
        particles[i].update();
        particles[i].draw();
        if (particles[i].alpha <= 0) {
          particles.splice(i, 1);
        }
      }

      animationId = requestAnimationFrame(animate);
    }

    // 启动烟花
    function startFireworks() {
      fireworksActive = true;
      particles = [];
      // 初始先放几个
      for(let i=0; i<4; i++) {
        setTimeout(() => {
          createExplosion(canvas.width * (0.2 + Math.random() * 0.6), canvas.height * 0.3);
        }, i * 150);
      }
      animate();
    }

    // 停止烟花
    function stopFireworks() {
      fireworksActive = false;
      cancelAnimationFrame(animationId);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    // 显示庆祝弹窗
    function showCelebration() {
      const modal = document.getElementById('celebrationModal');
      const quote = getRandomQuote();
      const img = document.getElementById('celebrationImage');
      
      img.style.display = 'block'; // 重置显示
      img.src = quote.image;
      document.getElementById('celebrationQuote').textContent = quote.text;
      document.getElementById('celebrationAuthor').textContent = quote.author;
      
      modal.classList.add('active');
      startFireworks();
    }
    
    // 关闭庆祝弹窗
    function closeCelebration() {
      const modal = document.getElementById('celebrationModal');
      modal.classList.remove('active');
      stopFireworks();
    }
    
    // 保存自定义名言
    function saveCustomQuote() {
      const text = document.getElementById('customQuoteText').value.trim();
      const author = document.getElementById('customQuoteAuthor').value.trim();
      
      if (!text) {
        alert('请输入名言内容');
        return;
      }
      
      const savedQuotes = JSON.parse(localStorage.getItem('customQuotes') || '[]');
      
      savedQuotes.push({
        text: text,
        author: author ? '—— ' + author : '',
        image: `https://source.unsplash.com/400x300/?nature,landscape,sky&sig=${Date.now()}`
      });
      
      localStorage.setItem('customQuotes', JSON.stringify(savedQuotes));
      
      document.getElementById('customQuoteText').value = '';
      document.getElementById('customQuoteAuthor').value = '';
      
      alert('名言已保存！完成任务时会随机显示哦~');
      closeCustomQuoteModal();
    }
    
    // 打开自定义名言弹窗
    function openCustomQuoteModal() {
      document.getElementById('customQuoteModal').classList.add('active');
    }
    
    // 关闭自定义名言弹窗
    function closeCustomQuoteModal() {
      document.getElementById('customQuoteModal').classList.remove('active');
    }
    
    // 获取随机名言
    function getRandomQuote() {
      const savedQuotes = JSON.parse(localStorage.getItem('customQuotes') || '[]');
      const allQuotes = [...literaryQuotes, ...savedQuotes];
      return allQuotes[Math.floor(Math.random() * allQuotes.length)];
    }
    
    // 获取今日字符串
    function getTodayStr() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }
    
    // 处理回车键
    function handleEnter(event) {
      if (event.key === 'Enter') {
        addTask();
      }
    }
    
    function handleSelectedDateEnter(event) {
      if (event.key === 'Enter') {
        const input = document.getElementById('selectedDateTask');
        const title = input.value.trim();
        
        if (!title) return;
        
        const data = JSON.parse(localStorage.getItem('plans') || '{}');
        if (!data[selectedDate]) {
          data[selectedDate] = { plan: '', tasks: [] };
        }
        
        data[selectedDate].tasks.push({
          title: title,
          completed: false
        });
        
        localStorage.setItem('plans', JSON.stringify(data));
        input.value = '';
        loadSelectedDateData();
        renderCalendar();
        renderStats();
      }
    }
    
    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
