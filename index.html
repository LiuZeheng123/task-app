<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>每日计划</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="每日计划">
  <link rel="icon" href="icon.png" type="image/png">
  <link rel="apple-touch-icon" href="icon.png">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
      color: #fff;
      min-height: 100vh;
      padding: 20px;
      overflow-x: hidden;
    }
    
    .header {
      text-align: center;
      margin-bottom: 20px;
      padding-top: 20px;
    }
    
    .header h1 {
      font-size: 28px;
      margin-bottom: 8px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .header p {
      color: #888;
      font-size: 14px;
    }
    
    .tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      background: rgba(255,255,255,0.05);
      padding: 5px;
      border-radius: 12px;
    }
    
    .tab {
      flex: 1;
      padding: 10px;
      background: transparent;
      border: none;
      color: #888;
      font-size: 13px;
      cursor: pointer;
      border-radius: 8px;
      transition: all 0.3s;
    }
    
    .tab.active {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #fff;
      font-weight: 600;
    }
    
    .section {
      display: none;
    }
    
    .section.active {
      display: block;
    }
    
    /* 统计卡片 */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin-bottom: 20px;
    }
    
    .stat-card {
      background: rgba(255,255,255,0.05);
      padding: 15px;
      border-radius: 12px;
      text-align: center;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .stat-icon {
      font-size: 24px;
      margin-bottom: 8px;
    }
    
    .stat-number {
      font-size: 24px;
      font-weight: bold;
      color: #667eea;
      margin-bottom: 4px;
    }
    
    .stat-label {
      font-size: 12px;
      color: #888;
    }
    
    /* 环形图 */
    .chart-container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .chart-title {
      font-size: 16px;
      margin-bottom: 15px;
      color: #667eea;
      text-align: center;
    }
    
    .circular-chart {
      display: block;
      margin: 0 auto;
      max-width: 200px;
      max-height: 200px;
    }
    
    .circle-bg {
      fill: none;
      stroke: rgba(255,255,255,0.1);
      stroke-width: 2.5;
    }
    
    .circle {
      fill: none;
      stroke-width: 2.5;
      stroke-linecap: round;
      transition: all 0.3s;
    }
    
    .percentage {
      fill: #fff;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: bold;
      font-size: 0.5em;
      text-anchor: middle;
    }
    
    /* 热力图 */
    .heatmap-container {
      background: rgba(255,255,255,0.05);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 20px;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .heatmap-title {
      font-size: 16px;
      margin-bottom: 15px;
      color: #667eea;
    }
    
    .heatmap {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }
    
    .heatmap-day {
      aspect-ratio: 1;
      border-radius: 4px;
      background: rgba(102, 126, 234, 0.1);
      transition: all 0.2s;
    }
    
    .heatmap-day.level-0 { background: rgba(102, 126, 234, 0.1); }
    .heatmap-day.level-1 { background: rgba(102, 126, 234, 0.3); }
    .heatmap-day.level-2 { background: rgba(102, 126, 234, 0.5); }
    .heatmap-day.level-3 { background: rgba(102, 126, 234, 0.7); }
    .heatmap-day.level-4 { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
    
    /* 日历样式 */
    .calendar-container {
      display: none;
    }
    
    .calendar-container.active {
      display: block;
    }
    
    .calendar-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
      padding: 15px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
    }
    
    .calendar-header h3 {
      font-size: 18px;
      color: #667eea;
    }
    
    .calendar-nav {
      background: rgba(102, 126, 234, 0.2);
      border: none;
      color: #667eea;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }
    
    .weekday {
      text-align: center;
      padding: 10px 5px;
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }
    
    .day {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      border: 2px solid transparent;
      position: relative;
    }
    
    .day.has-plan {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border-color: rgba(102, 126, 234, 0.5);
    }
    
    .day.today {
      border-color: #667eea;
      box-shadow: 0 0 15px rgba(102, 126, 234, 0.4);
    }
    
    .day.future {
      background: rgba(102, 126, 234, 0.1);
    }
    
    .day-number {
      font-size: 16px;
      font-weight: 600;
    }
    
    .day-indicator {
      width: 4px;
      height: 4px;
      background: #fff;
      border-radius: 50%;
      margin-top: 2px;
    }
    
    /* 输入区域 */
    .current-date {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 20px;
      text-align: center;
    }
    
    .current-date h2 {
      font-size: 20px;
      color: #667eea;
    }
    
    .input-group {
      margin-bottom: 15px;
    }
    
    .input-group label {
      display: block;
      margin-bottom: 8px;
      color: #aaa;
      font-size: 14px;
    }
    
    .input-group input,
    .input-group textarea {
      width: 100%;
      padding: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-family: inherit;
    }
    
    .input-group textarea {
      min-height: 80px;
      resize: vertical;
    }
    
    .btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.2s;
    }
    
    .btn:active {
      transform: scale(0.98);
    }
    
    .btn-secondary {
      background: rgba(255,255,255,0.1);
      margin-top: 10px;
    }
    
    .task-list {
      margin-top: 15px;
    }
    
    .task-item {
      background: rgba(255,255,255,0.05);
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all 0.3s;
    }
    
    .task-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid #667eea;
      border-radius: 5px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
    }
    
    .task-checkbox.checked {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    
    .task-content {
      flex: 1;
    }
    
    .task-title {
      font-size: 14px;
      margin-bottom: 3px;
    }
    
    .task-item.completed .task-title {
      text-decoration: line-through;
      color: #666;
    }
    
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: #666;
    }
    
    .empty-state-icon {
      font-size: 48px;
      margin-bottom: 15px;
      opacity: 0.3;
    }
    
    .selected-date-info {
      background: rgba(102, 126, 234, 0.1);
      border: 1px solid rgba(102, 126, 234, 0.3);
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 15px;
      text-align: center;
    }
    
    .selected-date-info h3 {
      color: #667eea;
      font-size: 16px;
    }
    
    /* 连续打卡 */
    .streak-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 15px;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>📅 每日计划</h1>
    <p>规划每一天，遇见更好的自己</p>
  </div>
  
  <div class="tabs">
    <button class="tab active" onclick="switchTab('today')">今日</button>
    <button class="tab" onclick="switchTab('calendar')">日历</button>
    <button class="tab" onclick="switchTab('stats')">统计</button>
  </div>
  
  <!-- 今日计划 -->
  <div id="todaySection" class="section active">
    <div class="current-date">
      <h2 id="currentDateDisplay"></h2>
    </div>
    
    <div id="streakContainer" style="text-align: center; margin-bottom: 15px;"></div>
    
    <div class="input-group">
      <label>📝 写下今天的目标与心情...</label>
      <textarea id="todayMood" placeholder="今天感觉如何？有什么想记录的？" onchange="saveMood()"></textarea>
    </div>
    
    <div class="input-group">
      <label>✅ 添加待办事项</label>
      <input type="text" id="taskInput" placeholder="输入任务内容..." onkeypress="handleEnter(event)">
    </div>
    
    <button class="btn" onclick="addTask()">添加任务</button>
    
    <div class="task-list" id="taskList"></div>
  </div>
  
  <!-- 日历视图 -->
  <div id="calendarSection" class="calendar-container section">
    <div class="calendar-header">
      <button class="calendar-nav" onclick="changeMonth(-1)">‹</button>
      <h3 id="calendarMonthYear"></h3>
      <button class="calendar-nav" onclick="changeMonth(1)">›</button>
    </div>
    
    <div class="calendar-grid">
      <div class="weekday">日</div>
      <div class="weekday">一</div>
      <div class="weekday">二</div>
      <div class="weekday">三</div>
      <div class="weekday">四</div>
      <div class="weekday">五</div>
      <div class="weekday">六</div>
    </div>
    
    <div class="calendar-grid" id="calendarDays"></div>
    
    <div id="selectedDateSection" style="display: none;">
      <div class="selected-date-info">
        <h3 id="selectedDateText"></h3>
      </div>
      
      <div class="input-group">
        <label>📝 计划内容</label>
        <textarea id="selectedDatePlan" placeholder="这一天有什么计划？" onchange="saveSelectedDatePlan()"></textarea>
      </div>
      
      <div class="input-group">
        <label>✅ 待办事项</label>
        <input type="text" id="selectedDateTask" placeholder="添加任务..." onkeypress="handleSelectedDateEnter(event)">
      </div>
      
      <button class="btn btn-secondary" onclick="closeSelectedDate()">关闭</button>
      
      <div class="task-list" id="selectedDateTaskList"></div>
    </div>
  </div>
  
  <!-- 统计视图 -->
  <div id="statsSection" class="section">
    <div class="stats-grid">
      <div class="stat-card">
        <div class="stat-icon">🔥</div>
        <div class="stat-number" id="streakDays">0</div>
        <div class="stat-label">连续打卡</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">✅</div>
        <div class="stat-number" id="totalCompleted">0</div>
        <div class="stat-label">总完成</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">📊</div>
        <div class="stat-number" id="weekCompletion">0%</div>
        <div class="stat-label">本周完成率</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">🎯</div>
        <div class="stat-number" id="monthTasks">0</div>
        <div class="stat-label">本月任务</div>
      </div>
    </div>
    
    <!-- 完成率环形图 -->
    <div class="chart-container">
      <div class="chart-title">本周完成率</div>
      <svg viewBox="0 0 36 36" class="circular-chart">
        <path class="circle-bg"
          d="M18 2.0845
            a 15.9155 15.9155 0 0 1 0 31.831
            a 15.9155 15.9155 0 0 1 0 -31.831"
        />
        <path class="circle"
          stroke="#667eea"
          stroke-dasharray="0, 100"
          id="completionCircle"
          d="M18 2.0845
            a 15.9155 15.9155 0 0 1 0 31.831
            a 15.9155 15.9155 0 0 1 0 -31.831"
        />
        <text x="18" y="20.35" class="percentage" id="completionText">0%</text>
      </svg>
    </div>
    
    <!-- 热力图 -->
    <div class="heatmap-container">
      <div class="heatmap-title">📅 近 35 天活跃度</div>
      <div class="heatmap" id="heatmap"></div>
    </div>
  </div>

  <script>
    // 全局变量
    let currentDate = new Date();
    let selectedDate = null;
    let currentMonth = new Date();
    
    // 初始化
    document.addEventListener('DOMContentLoaded', function() {
      updateDateDisplay();
      loadTodayData();
      renderCalendar();
      renderStats();
      
      // 注册 Service Worker
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
      }
    });
    
    // 切换标签
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
      
      if (tab === 'today') {
        document.querySelector('.tab:nth-child(1)').classList.add('active');
        document.getElementById('todaySection').classList.add('active');
        loadTodayData();
      } else if (tab === 'calendar') {
        document.querySelector('.tab:nth-child(2)').classList.add('active');
        document.getElementById('calendarSection').classList.add('active');
        renderCalendar();
      } else {
        document.querySelector('.tab:nth-child(3)').classList.add('active');
        document.getElementById('statsSection').classList.add('active');
        renderStats();
      }
    }
    
    // 更新日期显示
    function updateDateDisplay() {
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('currentDateDisplay').textContent = currentDate.toLocaleDateString('zh-CN', options);
    }
    
    // 渲染统计
    function renderStats() {
      const plans = JSON.parse(localStorage.getItem('plans') || '{}');
      const today = new Date();
      
      // 计算连续打卡天数
      let streak = 0;
      let checkDate = new Date(today);
      while (true) {
        const dateStr = formatDate(checkDate);
        if (plans[dateStr] && plans[dateStr].tasks && plans[dateStr].tasks.length > 0) {
          streak++;
          checkDate.setDate(checkDate.getDate() - 1);
        } else {
          break;
        }
      }
      document.getElementById('streakDays').textContent = streak;
      
      // 显示连续打卡徽章
      if (streak > 0) {
        document.getElementById('streakContainer').innerHTML = `
          <div class="streak-badge">
            🔥 已连续打卡 ${streak} 天
          </div>
        `;
      } else {
        document.getElementById('streakContainer').innerHTML = '';
      }
      
      // 计算总完成任务数
      let totalCompleted = 0;
      Object.values(plans).forEach(day => {
        if (day.tasks) {
          totalCompleted += day.tasks.filter(t => t.completed).length;
        }
      });
      document.getElementById('totalCompleted').textContent = totalCompleted;
      
      // 计算本周完成率
      const weekData = getWeekData();
      const weekTotal = weekData.reduce((sum, day) => sum + (day.total || 0), 0);
      const weekCompleted = weekData.reduce((sum, day) => sum + (day.completed || 0), 0);
      const weekPercent = weekTotal === 0 ? 0 : Math.round((weekCompleted / weekTotal) * 100);
      document.getElementById('weekCompletion').textContent = weekPercent + '%';
      
      // 更新环形图
      updateCircularChart(weekPercent);
      
      // 计算本月任务数
      const monthStr = `${today.getFullYear()}-${String(today.getMonth() + 1).padStart(2, '0')}`;
      let monthTasks = 0;
      Object.keys(plans).forEach(date => {
        if (date.startsWith(monthStr) && plans[date].tasks) {
          monthTasks += plans[date].tasks.length;
        }
      });
      document.getElementById('monthTasks').textContent = monthTasks;
      
      // 渲染热力图
      renderHeatmap();
    }
    
    // 获取本周数据
    function getWeekData() {
      const today = new Date();
      const weekData = [];
      for (let i = 6; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = formatDate(date);
        const plans = JSON.parse(localStorage.getItem('plans') || '{}');
        const dayData = plans[dateStr] || { tasks: [] };
        const total = dayData.tasks ? dayData.tasks.length : 0;
        const completed = dayData.tasks ? dayData.tasks.filter(t => t.completed).length : 0;
        weekData.push({ date: dateStr, total, completed });
      }
      return weekData;
    }
    
    // 更新环形图
    function updateCircularChart(percent) {
      const circle = document.getElementById('completionCircle');
      const text = document.getElementById('completionText');
      circle.setAttribute('stroke-dasharray', `${percent}, 100`);
      text.textContent = `${percent}%`;
    }
    
    // 渲染热力图
    function renderHeatmap() {
      const heatmap = document.getElementById('heatmap');
      heatmap.innerHTML = '';
      
      const plans = JSON.parse(localStorage.getItem('plans') || '{}');
      const today = new Date();
      
      // 生成近 35 天
      for (let i = 34; i >= 0; i--) {
        const date = new Date(today);
        date.setDate(date.getDate() - i);
        const dateStr = formatDate(date);
        const dayData = plans[dateStr] || { tasks: [] };
        const taskCount = dayData.tasks ? dayData.tasks.length : 0;
        
        const day = document.createElement('div');
        day.className = 'heatmap-day';
        
        if (taskCount === 0) {
          day.classList.add('level-0');
        } else if (taskCount <= 2) {
          day.classList.add('level-1');
        } else if (taskCount <= 4) {
          day.classList.add('level-2');
        } else if (taskCount <= 6) {
          day.classList.add('level-3');
        } else {
          day.classList.add('level-4');
        }
        
        day.title = `${dateStr}: ${taskCount} 个任务`;
        heatmap.appendChild(day);
      }
    }
    
    // 格式化日期
    function formatDate(date) {
      return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')}`;
    }
    
    // 渲染日历
    function renderCalendar() {
      const year = currentMonth.getFullYear();
      const month = currentMonth.getMonth();
      
      const monthNames = ['一月', '二月', '三月', '四月', '五月', '六月', 
                         '七月', '八月', '九月', '十月', '十一月', '十二月'];
      document.getElementById('calendarMonthYear').textContent = `${year}年${monthNames[month]}`;
      
      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const today = new Date();
      
      const calendarDays = document.getElementById('calendarDays');
      calendarDays.innerHTML = '';
      
      for (let i = 0; i < firstDay; i++) {
        const empty = document.createElement('div');
        calendarDays.appendChild(empty);
      }
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
        const dayEl = document.createElement('div');
        dayEl.className = 'day';
        
        if (year === today.getFullYear() && month === today.getMonth() && day === today.getDate()) {
          dayEl.classList.add('today');
        }
        
        const thisDate = new Date(year, month, day);
        if (thisDate > today) {
          dayEl.classList.add('future');
        }
        
        const plans = JSON.parse(localStorage.getItem('plans') || '{}');
        if (plans[dateStr]) {
          dayEl.classList.add('has-plan');
        }
        
        dayEl.innerHTML = `
          <div class="day-number">${day}</div>
          ${plans[dateStr] ? '<div class="day-indicator"></div>' : ''}
        `;
        
        dayEl.onclick = () => selectDate(dateStr, day);
        calendarDays.appendChild(dayEl);
      }
    }
    
    // 选择日期
    function selectDate(dateStr, day) {
      selectedDate = dateStr;
      const dateObj = new Date(dateStr);
      const options = { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' };
      document.getElementById('selectedDateText').textContent = dateObj.toLocaleDateString('zh-CN', options);
      
      document.getElementById('selectedDateSection').style.display = 'block';
      loadSelectedDateData();
      document.getElementById('selectedDateSection').scrollIntoView({ behavior: 'smooth' });
    }
    
    // 关闭选择日期
    function closeSelectedDate() {
      document.getElementById('selectedDateSection').style.display = 'none';
      selectedDate = null;
      renderCalendar();
    }
    
    // 切换月份
    function changeMonth(delta) {
      currentMonth.setMonth(currentMonth.getMonth() + delta);
      renderCalendar();
    }
    
    // 加载今日数据
    function loadTodayData() {
      const today = getTodayStr();
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      const todayData = data[today] || { mood: '', tasks: [] };
      
      document.getElementById('todayMood').value = todayData.mood || '';
      renderTaskList(todayData.tasks || [], 'taskList');
    }
    
    // 保存心情
    function saveMood() {
      const today = getTodayStr();
      const mood = document.getElementById('todayMood').value;
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[today]) {
        data[today] = { mood: '', tasks: [] };
      }
      
      data[today].mood = mood;
      localStorage.setItem('plans', JSON.stringify(data));
    }
    
    // 加载选择日期的数据
    function loadSelectedDateData() {
      if (!selectedDate) return;
      
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      const dateData = data[selectedDate] || { plan: '', tasks: [] };
      
      document.getElementById('selectedDatePlan').value = dateData.plan || '';
      renderTaskList(dateData.tasks || [], 'selectedDateTaskList');
    }
    
    // 保存选择日期的计划
    function saveSelectedDatePlan() {
      if (!selectedDate) return;
      
      const plan = document.getElementById('selectedDatePlan').value;
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[selectedDate]) {
        data[selectedDate] = { plan: '', tasks: [] };
      }
      
      data[selectedDate].plan = plan;
      localStorage.setItem('plans', JSON.stringify(data));
      renderCalendar();
    }
    
    // 渲染任务列表
    function renderTaskList(tasks, containerId) {
      const container = document.getElementById(containerId);
      
      if (tasks.length === 0) {
        container.innerHTML = `
          <div class="empty-state">
            <div class="empty-state-icon">📋</div>
            <p>暂无待办，添加一个吧 ✨</p>
          </div>
        `;
        return;
      }
      
      container.innerHTML = tasks.map((task, index) => `
        <div class="task-item ${task.completed ? 'completed' : ''}" onclick="toggleTask(${index}, '${containerId}')">
          <div class="task-checkbox ${task.completed ? 'checked' : ''}">
            ${task.completed ? '✓' : ''}
          </div>
          <div class="task-content">
            <div class="task-title">${escapeHtml(task.title)}</div>
          </div>
        </div>
      `).join('');
    }
    
    // 添加任务
    function addTask() {
      const input = document.getElementById('taskInput');
      const title = input.value.trim();
      
      if (!title) {
        alert('请输入任务内容');
        return;
      }
      
      const today = getTodayStr();
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (!data[today]) {
        data[today] = { mood: '', tasks: [] };
      }
      
      data[today].tasks.push({
        title: title,
        completed: false
      });
      
      localStorage.setItem('plans', JSON.stringify(data));
      input.value = '';
      loadTodayData();
      renderStats();
    }
    
    // 切换任务完成状态
    function toggleTask(index, containerId) {
      const date = containerId === 'taskList' ? getTodayStr() : selectedDate;
      const data = JSON.parse(localStorage.getItem('plans') || '{}');
      
      if (data[date] && data[date].tasks[index]) {
        data[date].tasks[index].completed = !data[date].tasks[index].completed;
        localStorage.setItem('plans', JSON.stringify(data));
        
        if (containerId === 'taskList') {
          loadTodayData();
        } else {
          loadSelectedDateData();
        }
        renderStats();
      }
    }
    
    // 获取今日字符串
    function getTodayStr() {
      const now = new Date();
      return `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}-${String(now.getDate()).padStart(2, '0')}`;
    }
    
    // 处理回车键
    function handleEnter(event) {
      if (event.key === 'Enter') {
        addTask();
      }
    }
    
    function handleSelectedDateEnter(event) {
      if (event.key === 'Enter') {
        const input = document.getElementById('selectedDateTask');
        const title = input.value.trim();
        
        if (!title) return;
        
        const data = JSON.parse(localStorage.getItem('plans') || '{}');
        if (!data[selectedDate]) {
          data[selectedDate] = { plan: '', tasks: [] };
        }
        
        data[selectedDate].tasks.push({
          title: title,
          completed: false
        });
        
        localStorage.setItem('plans', JSON.stringify(data));
        input.value = '';
        loadSelectedDateData();
        renderCalendar();
        renderStats();
      }
    }
    
    // HTML 转义
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
